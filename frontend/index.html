<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZKTeco Access Gateway</title>
    <meta name="description" content="Manage and monitor your ZKTeco C3 Access Controllers via MQTT">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
  </head>
  <body class="dark-theme">
    <div class="app-container">
      <!-- Sidebar -->
      <aside class="sidebar glass-panel">
        <div class="logo">
          <div class="logo-icon"></div>
          <h1>ZKAccess Gateway</h1>
        </div>
        <nav class="nav-menu">
          <button class="nav-item active" data-target="dashboard">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>
            Dashboard
          </button>
          <button class="nav-item" data-target="doors">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"></path><path d="M12 5l7 7-7 7"></path></svg>
            Doors & Events
          </button>
          <button class="nav-item" data-target="users">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
            Users & Keys
          </button>
        </nav>
      </aside>

      <!-- Main Content -->
      <main class="main-content">
        <!-- Dashboard View -->
        <section id="dashboard" class="view-section active">
          <header class="view-header">
            <h2>System Overview</h2>
            <div style="display:flex; gap:10px; align-items: center;">
              <button class="btn primary" id="sync-time-btn">Sync Time</button>
              <button class="btn primary" style="background:var(--color-danger);" id="reboot-btn">Reboot Device</button>
            </div>
          </header>
          
          <div class="stats-grid">
            <div class="stat-card glass-panel interactive">
              <h3>Controller Status</h3>
              <div class="status-badge connected" id="controller-status" style="width: max-content; padding: 0.5rem 1rem; margin-top: 0.5rem;">
                <span class="pulse-dot"></span>
                <span class="status-text">Connected</span>
              </div>
            </div>
            <div class="stat-card glass-panel interactive">
              <h3>Device IP</h3>
              <p class="stat-value" id="stat-ip">--</p>
            </div>
            <div class="stat-card glass-panel interactive">
              <h3>Serial Number</h3>
              <p class="stat-value" id="stat-sn">--</p>
            </div>
            <div class="stat-card glass-panel interactive">
              <h3>Total Users</h3>
              <p class="stat-value" id="stat-users">--</p>
            </div>
            <div class="stat-card glass-panel interactive">
              <h3>MQTT Status</h3>
              <p class="stat-value" id="stat-mqtt">--</p>
            </div>
          </div>
          
          <div style="margin-top: 2rem;">
            <header class="view-header">
                <h2>Hardware Topology</h2>
                <button class="btn primary" id="refresh-hardware-btn">Refresh</button>
            </header>
            <div class="stats-grid" id="hw-params-container">
                <!-- Dynamic Content -->
            </div>
          </div>
        </section>

        <!-- Events Log -->
        <section id="doors" class="view-section hidden">
          <header class="view-header">
            <h2>Activity Logs</h2>
            <button class="btn primary" id="refresh-doors-btn">Refresh</button>
          </header>

          <div class="events-log glass-panel" style="padding: 1.5rem;">
            <h3 style="margin-bottom: 1.5rem;">Recent Events</h3>
            <div class="table-container">
              <table id="events-table">
                <thead>
                  <tr>
                    <th>Time</th>
                    <th>Door</th>
                    <th>Card</th>
                    <th>Event Type</th>
                  </tr>
                </thead>
                <tbody id="events-tbody">
                  <!-- Dynamic Content -->
                </tbody>
              </table>
            </div>
          </div>
        </section>

        <!-- Users View -->
        <section id="users" class="view-section hidden">
          <header class="view-header">
            <h2>Authorized Personnel</h2>
            <button class="btn primary" id="refresh-users-btn">Refresh</button>
          </header>
          
          <div class="glass-panel" style="margin-bottom: 2rem; padding: 1.5rem;">
            <h3 style="margin-bottom: 1.5rem; font-size: 1.25rem;">Create New User</h3>
            <form id="create-user-form" style="display: grid; grid-template-columns: 1fr 2fr 1fr auto auto; gap: 1.5rem; align-items: end;">
              <div class="form-group" style="margin-bottom: 0;">
                <label>PIN (Numeric ID)</label>
                <input type="text" id="new-user-pin" required title="Unique arbitrary number between 1 and 65534" placeholder="1234">
              </div>
              <div class="form-group" style="margin-bottom: 0;">
                <label>Card Number</label>
                <div style="display: flex; gap: 0.5rem;">
                  <input type="text" id="new-user-card" placeholder="Optional" style="flex: 1;">
                  <button type="button" class="btn secondary" id="autofill-card-btn" title="Use Last Swiped Unassigned Card" style="white-space: nowrap; height: 100%;">Latest Swipe</button>
                </div>
              </div>
              <div class="form-group" style="margin-bottom: 0;">
                <label>Access Group</label>
                <input type="text" id="new-user-group" value="0">
              </div>
               <div class="form-group" style="margin-bottom: 0; display: flex; flex-direction: column; align-items: center; padding-bottom: 0.75rem;">
                <label>Admin</label>
                <input type="checkbox" id="new-user-admin" style="width: auto; transform: scale(1.5); cursor: pointer;">
              </div>
              <div class="form-group" style="margin-bottom: 0;">
                <button type="submit" class="btn primary" style="background: var(--color-success); width: 100%; white-space: nowrap;">Create User</button>
              </div>
            </form>
          </div>

          <div class="table-container glass-panel">
            <table id="users-table">
              <thead>
                <tr>
                  <th>PIN</th>
                  <th>Card ID</th>
                  <th>Group</th>
                  <th>Privileges</th>
                  <th>Last Swiped</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="users-tbody">
                <!-- Dynamic Content -->
              </tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container" class="toast-container"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
