<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZKTeco Access Gateway</title>
    <meta name="description" content="Manage and monitor your ZKTeco C3 Access Controllers via MQTT">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
  </head>
  <body class="dark-theme">
    <div class="app-container">
      <!-- Sidebar -->
      <aside class="sidebar glass-panel">
        <div class="logo">
          <div class="logo-icon"></div>
          <h1>ZKAccess Gateway</h1>
        </div>
        <nav class="nav-menu">
          <button class="nav-item active" data-target="dashboard">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>
            Dashboard
          </button>
          <button class="nav-item" data-target="doors">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"></path><path d="M12 5l7 7-7 7"></path></svg>
            Doors & Events
          </button>
          <button class="nav-item" data-target="users">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
            Users & Keys
          </button>
          <button class="nav-item" data-target="hardware">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
            Hardware Overview
          </button>
        </nav>
      </aside>

      <!-- Main Content -->
      <main class="main-content">
        <!-- Dashboard View -->
        <section id="dashboard" class="view-section active">
          <header class="view-header">
            <h2>System Overview</h2>
            <div class="status-badge connected" id="controller-status">
              <span class="pulse-dot"></span>
              <span class="status-text">Connected</span>
            </div>
          </header>
          
          <div class="stats-grid">
            <div class="stat-card glass-panel interactive">
              <h3>Device IP</h3>
              <p class="stat-value" id="stat-ip">--</p>
            </div>
            <div class="stat-card glass-panel interactive">
              <h3>Serial Number</h3>
              <p class="stat-value" id="stat-sn">--</p>
            </div>
            <div class="stat-card glass-panel interactive">
              <h3>Total Users</h3>
              <p class="stat-value" id="stat-users">--</p>
            </div>
            <div class="stat-card glass-panel interactive">
              <h3>MQTT Status</h3>
              <p class="stat-value" id="stat-mqtt">--</p>
            </div>
          </div>
        </section>

        <!-- Doors View -->
        <section id="doors" class="view-section hidden">
          <header class="view-header">
            <h2>Doors & Relays</h2>
            <button class="btn primary" id="refresh-doors-btn">Refresh</button>
          </header>
          
          <div class="doors-grid" id="doors-container">
            <!-- Dynamic Content populated by JS -->
          </div>

          <div class="events-log glass-panel">
            <h3>Recent Events</h3>
            <div class="table-container">
              <table id="events-table">
                <thead>
                  <tr>
                    <th>Time</th>
                    <th>Door</th>
                    <th>Card</th>
                    <th>Event Type</th>
                  </tr>
                </thead>
                <tbody id="events-tbody">
                  <!-- Dynamic Content -->
                </tbody>
              </table>
            </div>
          </div>
        </section>

        <!-- Users View -->
        <section id="users" class="view-section hidden">
          <header class="view-header">
            <h2>Authorized Personnel</h2>
            <button class="btn primary" id="refresh-users-btn">Refresh</button>
          </header>
          
          <div class="table-container glass-panel">
            <table id="users-table">
              <thead>
                <tr>
                  <th>PIN</th>
                  <th>Card ID</th>
                  <th>Group</th>
                  <th>Privileges</th>
                </tr>
              </thead>
              <tbody id="users-tbody">
                <!-- Dynamic Content -->
              </tbody>
            </table>
          </div>
        </section>

        <!-- Hardware View -->
        <section id="hardware" class="view-section hidden">
          <header class="view-header">
            <h2>Hardware Topology</h2>
            <button class="btn primary" id="refresh-hardware-btn">Refresh</button>
          </header>
          
          <div class="stats-grid" id="hw-params-container">
            <!-- Dynamic Content -->
          </div>
        </section>
      </main>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container" class="toast-container"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
